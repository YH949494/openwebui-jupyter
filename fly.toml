app = "openwebui-jupyter"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  JUPYTER_PORT = "8888"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 10
    hard_limit = 20

[[vm]]
  size = "performance-2x"
  memory = "4gb"
